services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: multitenant_sso
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8443"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8443:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      # Django
      SECRET_KEY: django-insecure-docker-demo-key
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,django"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://localhost:8443"
      FERNET_KEYS: "oFeOzOZYMFSV4qentv_PtDjFqnpjYBIyINo449zf2pc="
      # Database
      DB_ENGINE: postgresql
      DB_NAME: multitenant_sso
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      # Email (Mailpit)
      EMAIL_BACKEND: smtp
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "False"
      DEFAULT_FROM_EMAIL: "noreply@demo.localhost"
      MULTITENANT_INVITATION_FROM_EMAIL: "invitations@demo.localhost"
      # Keycloak (internal URL for fetching SAML certs etc.)
      KEYCLOAK_INTERNAL_URL: "http://keycloak:8080"
      # Site
      SITE_NAME: "Multi-Tenant SSO Demo"
      SITE_DOMAIN: "localhost:8000"
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro

volumes:
  pgdata:
